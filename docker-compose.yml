services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: inferadoc-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: inferadoc
      POSTGRES_PASSWORD: inferadoc_secret
      POSTGRES_DB: inferadoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inferadoc -d inferadoc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
